<p>In 2004, the Cabinet approved collaboration between the Ministry of Public Health and the Ministry of University Affairs to produce rural doctors.</p>

<script>
let currentLang = "th";

function toggleLanguage() {
    const elements = document.querySelectorAll("[data-th]");
    const button = document.querySelector(".lang-btn");

    if (currentLang === "th") {
        elements.forEach(el => {
            if (el.getAttribute("data-en")) {
                el.innerHTML = el.getAttribute("data-en");
            }
        });
        document.documentElement.lang = "en";
        button.innerText = "TH";
        currentLang = "en";
    } else {
        elements.forEach(el => {
            if (el.getAttribute("data-th")) {
                el.innerHTML = el.getAttribute("data-th");
            }
        });
        document.documentElement.lang = "th";
        button.innerText = "EN";
        currentLang = "th";
    }
}
</script>
