    <p data-th="ประวัติและความเป็นมา

ชื่อหน่วยงาน : ศูนย์แพทยศาสตรศึกษาชั้นคลินิก โรงพยาบาลชุมพรเขตรอุดมศักดิ์

222 ถนนพิศิษฐพยาบาล ตำบลท่าตะเภา อำเภอเมือง จังหวัดชุมพร 86000

ประวัติความเป็นมา

เมื่อ พ.ศ. 2547 คณะรัฐมนตรีมีมติเห็นชอบให้กระทรวงสาธารณสุขร่วมมือกับทบวงมหาวิทยาลัย (กระทรวงศึกษาธิการในขณะนั้น) จัดทำ “โครงการผลิตแพทย์เพื่อชาวชนบท” โดยเริ่มรับนักศึกษาตั้งแต่ปีการศึกษา 2548 เป็นต้นไป เพื่อแก้ไขปัญหาการขาดแคลนแพทย์และการกระจายแพทย์ที่ไม่เหมาะสมในพื้นที่ชนบท

กระทรวงสาธารณสุขจึงมีคำสั่งจัดตั้ง ศูนย์แพทยศาสตรศึกษาชั้นคลินิก ขึ้นเป็นหน่วยงานภายในโรงพยาบาลศูนย์ ทำหน้าที่จัดการเรียนการสอนในชั้นคลินิกให้แก่นักศึกษาแพทย์ในโครงการร่วมผลิตแพทย์เพิ่มเพื่อชาวชนบท ซึ่งเป็นโครงการความร่วมมือระหว่างกระทรวงสาธารณสุขและทบวงมหาวิทยาลัย

โรงพยาบาลชุมพรเขตรอุดมศักดิ์ เป็นโรงพยาบาลอีกแห่งหนึ่งที่ได้รับการอนุมัติตามมติคณะรัฐมนตรี ว่ามีศักยภาพและความพร้อมในการจัดการเรียนการสอนนักศึกษาแพทย์ในโครงการผลิตแพทย์เพื่อชาวชนบท เมื่อวันที่ 15 มิถุนายน พ.ศ. 2547 โดยกระทรวงสาธารณสุขได้มีคำสั่งให้จัดตั้ง ศูนย์แพทยศาสตรศึกษาชั้นคลินิก สาขาโรงพยาบาลชุมพรเขตรอุดมศักดิ์

โรงพยาบาลชุมพรเขตรอุดมศักดิ์ได้ให้ความร่วมมือในการผลิตแพทย์เพื่อชาวชนบทร่วมกับคณะแพทยศาสตร์ มหาวิทยาลัยธรรมศาสตร์ โดยในปีการศึกษา 2551 ได้เปิดสอนนักศึกษารุ่นแรก (ชั้นปีที่ 6) จำนวน 13 คน และในปีการศึกษา 2559 เปิดสอนนักศึกษาแพทย์ชั้นปีที่ 4 ชั้นปีที่ 5 และชั้นปีที่ 6 รวมจำนวน 42 คน

อนึ่ง การคัดเลือกผู้เข้าศึกษาหลักสูตรแพทยศาสตรบัณฑิตในเครือข่ายโรงพยาบาลชุมพรเขตรอุดมศักดิ์ รับนักเรียนจากพื้นที่ 3 จังหวัด ได้แก่ จังหวัดสุราษฎร์ธานี จังหวัดชุมพร และจังหวัดระนอง"
       data-en="History and Background

Name of Institution: Clinical Medical Education Center, Chumphon Khet Udomsak Hospital
Location: Clinical Medical Education Center Office
Chumphon Khet Udomsak Hospital
222 Phisit Phayaban Road, Tha Taphao Subdistrict, Mueang District, Chumphon 86000, Thailand

Historical Background

In 2004 (B.E. 2547), the Cabinet of Thailand approved a resolution authorizing the Ministry of Public Health to collaborate with the Ministry of University Affairs (under the Ministry of Education at that time) to implement the “Collaborative Project to Increase Production of Rural Doctors.” The project began admitting medical students in the 2005 academic year onward. Its objective was to address the shortage of physicians and the unequal distribution of doctors in rural areas.

The Ministry of Public Health subsequently issued an order to establish Clinical Medical Education Centers within regional hospitals. These centers are responsible for providing clinical training for medical students under the Collaborative Project to Increase Production of Rural Doctors, which is a joint initiative between the Ministry of Public Health and the Ministry of University Affairs.

Chumphon Khet Udomsak Hospital was one of the hospitals approved by Cabinet resolution as having the capability and readiness to provide clinical medical education under this project. On June 15, 2004, the Ministry of Public Health officially established the Clinical Medical Education Center, Chumphon Khet Udomsak Hospital.

The hospital collaborates with the Faculty of Medicine, Thammasat University, in producing medical graduates for rural communities. In the 2008 academic year (B.E. 2551), the center admitted its first group of medical students (6th year) totaling 13 students. In the 2016 academic year (B.E. 2559), the center expanded to provide training for 4th, 5th, and 6th year medical students, with a total of 42 students.

Student selection for the Doctor of Medicine program under the Chumphon Khet Udomsak Hospital network focuses on applicants from three provinces: Surat Thani, Chumphon, and Ranong.">

<script>
let currentLang = "th";

function toggleLanguage() {
    const elements = document.querySelectorAll("[data-th]");
    const button = document.querySelector(".lang-btn");

    if (currentLang === "th") {
        elements.forEach(el => el.innerText = el.getAttribute("data-en"));
        document.documentElement.lang = "en";
        button.innerText = "TH";
        currentLang = "en";
    } else {
        elements.forEach(el => el.innerText = el.getAttribute("data-th"));
        document.documentElement.lang = "th";
        button.innerText = "EN";
        currentLang = "th";
    }
}
</script>
