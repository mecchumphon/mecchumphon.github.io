<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEC Startup + Login</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Sarabun', sans-serif;
    background: #0f172a;
    color: white;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
}

/* Hero */
.hero {
    height: 90vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: radial-gradient(circle at top, #2563eb, #0f172a);
}

.hero h1 {
    font-size: 3rem;
    margin-bottom: 15px;
}

.hero p {
    opacity: 0.8;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: #3b82f6;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    color: white;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* Section */
.section {
    padding: 80px 40px;
}

/* Cards */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

/* Map */
iframe {
    width: 100%;
    height: 400px;
    border-radius: 15px;
    margin-top: 20px;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    opacity: 0.6;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.7);
}

.modal-content {
    margin: 10% auto;
    padding: 30px;
    width: 300px;
    border-radius: 20px;
    text-align: center;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

.close {
    float: right;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <h3>MEC</h3>
    <div id="navMenu">
        <a href="#">Home</a>
        <a href="#news">News</a>
        <a href="#map">Map</a>
        <a href="#" onclick="openLogin()">Login</a>
    </div>
</nav>

<!-- Hero -->
<section class="hero">
    <h1>Medical Education Center</h1>
    <p>Future Doctors Start Here</p>
    <button class="btn" onclick="scrollToSection()">Explore</button>
</section>

<!-- News -->
<section class="section" id="news">
    <h2>Latest News</h2>
    <br>
    <div class="grid">
        <div class="card">
            <h3>Workshop 2026</h3>
            <p>พัฒนาทักษะนักศึกษาแพทย์...</p>
        </div>
        <div class="card">
            <h3>Clinical Training</h3>
            <p>เตรียมความพร้อมก่อนขึ้นวอร์ด...</p>
        </div>
        <div class="card">
            <h3>New Curriculum</h3>
            <p>ปรับปรุงหลักสูตรใหม่...</p>
        </div>
    </div>
</section>

<!-- Map -->
<section class="section" id="map">
    <h2>Location</h2>
    <iframe src="https://www.google.com/maps?q=โรงพยาบาลชุมพรเขตรอุดมศักดิ์&output=embed"></iframe>
</section>

<!-- Footer -->
<footer>
    © 2026 MEC Chumphon
</footer>

<!-- Login Modal -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeLogin()">&times;</span>
    <h2>🔐 Login</h2>

    <input type="text" id="username" placeholder="Student ID">
    <input type="password" id="password" placeholder="Password">

    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<script>
function scrollToSection() {
    document.getElementById("news").scrollIntoView({ behavior: "smooth" });
}

// modal
function openLogin() {
    document.getElementById("loginModal").style.display = "block";
}

function closeLogin() {
    document.getElementById("loginModal").style.display = "none";
}

// mock user
const users = [
  { username: "med001", password: "1234", name: "Intern Year 4" },
  { username: "med002", password: "1234", name: "Extern Year 3" }
];

// login
function login() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    const user = users.find(x => x.username === u && x.password === p);

    if(user){
        localStorage.setItem("user", JSON.stringify(user));
        alert("Login Success");
        location.reload();
    } else {
        alert("Invalid ID or Password");
    }
}

// check login
window.onload = function(){
    const user = JSON.parse(localStorage.getItem("user"));

    if(user){
        document.getElementById("navMenu").innerHTML = `
            <span>👨‍⚕️ ${user.name}</span>
            <a href="#" onclick="logout()">Logout</a>
        `;
    }
}

// logout
function logout(){
    localStorage.removeItem("user");
    location.reload();
}
</script>

</body>
</html>
