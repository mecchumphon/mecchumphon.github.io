<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEC Website</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Sarabun', sans-serif;
    background:#0f172a;
    color:white;
}

/* Navbar */
nav {
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:rgba(0,0,0,0.5);
    position:sticky;
    top:0;
}

nav a {
    color:white;
    text-decoration:none;
    margin-left:15px;
}

.lang-btn {
    margin-left:20px;
    cursor:pointer;
}

/* Hero */
.hero {
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background:linear-gradient(135deg,#2563eb,#0f172a);
}

.hero h1 { font-size:2.5rem; }

.btn {
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

/* Section */
.section { padding:60px 20px; }

/* News */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card {
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:12px;
}

/* Modal */
.modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.7);
}

.modal-content {
    background:#1e293b;
    margin:10% auto;
    padding:20px;
    width:90%;
    max-width:500px;
    border-radius:10px;
}

.close { float:right; cursor:pointer; }

/* Map */
iframe {
    width:100%;
    height:350px;
    border:none;
    border-radius:10px;
}

/* Responsive */
@media(max-width:600px){
    .hero h1 { font-size:1.8rem; }
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <h3>MEC</h3>
    <div>
        <a href="#" id="navHome">หน้าแรก</a>
        <a href="#news" id="navNews">ข่าว</a>
        <a href="#map" id="navMap">แผนที่</a>
        <span class="lang-btn" onclick="setLang('th')">🇹🇭</span>
        <span class="lang-btn" onclick="setLang('en')">🇬🇧</span>
    </div>
</nav>

<!-- Hero -->
<section class="hero">
    <h1 id="heroTitle"></h1>
    <p id="heroDesc"></p>
    <button class="btn" onclick="scrollToNews()" id="heroBtn"></button>
</section>

<!-- News -->
<section class="section" id="news">
    <h2 id="newsTitle"></h2><br>

    <div class="grid">
        <div class="card">
            <h3 id="n1"></h3>
            <p id="n1s"></p>
            <button onclick="openModal('news1')" id="read1"></button>
        </div>

        <div class="card">
            <h3 id="n2"></h3>
            <p id="n2s"></p>
            <button onclick="openModal('news2')" id="read2"></button>
        </div>
    </div>
</section>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>
    </div>
</div>

<!-- Map -->
<section class="section" id="map">
    <h2 id="mapTitle"></h2><br>
    <iframe src="https://www.google.com/maps?q=โรงพยาบาลชุมพรเขตรอุดมศักดิ์&output=embed"></iframe>
</section>

<script>
// scroll
function scrollToNews(){
    document.getElementById("news").scrollIntoView({behavior:"smooth"});
}

// language data
const langData = {
th: {
    navHome:"หน้าแรก",
    navNews:"ข่าว",
    navMap:"แผนที่",
    heroTitle:"ศูนย์แพทยศาสตรศึกษาชั้นคลินิก",
    heroDesc:"โรงพยาบาลชุมพรเขตรอุดมศักดิ์",
    heroBtn:"ดูข่าว",
    newsTitle:"ข่าวประชาสัมพันธ์",
    read:"อ่านเพิ่มเติม",
    mapTitle:"แผนที่",
    news:{
        news1:{title:"กิจกรรมอบรม", short:"พัฒนานักศึกษาแพทย์...", full:"รายละเอียดกิจกรรมอบรม..."},
        news2:{title:"ฝึกคลินิก", short:"เรียนรู้ในวอร์ด...", full:"รายละเอียดการฝึกปฏิบัติ..."}
    }
},
en: {
    navHome:"Home",
    navNews:"News",
    navMap:"Map",
    heroTitle:"Medical Education Center",
    heroDesc:"Chumphon Hospital",
    heroBtn:"View News",
    newsTitle:"Latest News",
    read:"Read More",
    mapTitle:"Location",
    news:{
        news1:{title:"Workshop", short:"Medical training...", full:"Workshop details..."},
        news2:{title:"Clinical Training", short:"Ward experience...", full:"Clinical training details..."}
    }
}
};

let currentLang = "th";

// set language
function setLang(lang){
    currentLang = lang;
    const d = langData[lang];

    document.getElementById("navHome").innerText = d.navHome;
    document.getElementById("navNews").innerText = d.navNews;
    document.getElementById("navMap").innerText = d.navMap;

    document.getElementById("heroTitle").innerText = d.heroTitle;
    document.getElementById("heroDesc").innerText = d.heroDesc;
    document.getElementById("heroBtn").innerText = d.heroBtn;

    document.getElementById("newsTitle").innerText = d.newsTitle;
    document.getElementById("mapTitle").innerText = d.mapTitle;

    document.getElementById("n1").innerText = d.news.news1.title;
    document.getElementById("n1s").innerText = d.news.news1.short;
    document.getElementById("read1").innerText = d.read;

    document.getElementById("n2").innerText = d.news.news2.title;
    document.getElementById("n2s").innerText = d.news.news2.short;
    document.getElementById("read2").innerText = d.read;
}

// modal
function openModal(id){
    const d = langData[currentLang].news[id];
    document.getElementById("modal").style.display = "block";
    document.getElementById("modalTitle").innerText = d.title;
    document.getElementById("modalText").innerText = d.full;
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// init
setLang("th");
</script>

</body>
</html>
