<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEC Chumphon</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Sarabun', sans-serif;
    margin: 0;
    background: #f5f7fa;
}

/* Navbar */
nav {
    background: #0d6efd;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
}

/* Hero */
.hero {
    background: linear-gradient(to right, #0d6efd, #4dabf7);
    color: white;
    padding: 80px 20px;
    text-align: center;
}

/* Section */
.section {
    padding: 40px 20px;
}

/* News */
.news {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

button {
    background: #0d6efd;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: white;
    margin: 10% auto;
    padding: 20px;
    width: 80%;
    border-radius: 10px;
}

.close {
    float: right;
    cursor: pointer;
    font-size: 20px;
}

/* Map */
iframe {
    width: 100%;
    height: 400px;
    border: none;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <h3>MEC Chumphon</h3>
    <div>
        <a href="#">หน้าแรก</a>
        <a href="#news">ข่าว</a>
        <a href="#map">แผนที่</a>
    </div>
</nav>

<!-- Hero -->
<div class="hero">
    <h1>ศูนย์แพทยศาสตรศึกษาชั้นคลินิก</h1>
    <p>โรงพยาบาลชุมพรเขตรอุดมศักดิ์</p>
</div>

<!-- News Section -->
<div class="section" id="news">
    <h2>ข่าวประชาสัมพันธ์</h2>

    <div class="news">
        <div class="card">
            <h3>กิจกรรมอบรม</h3>
            <p>เข้าใจตนเองเพื่อเข้าใจผู้อื่น...</p>
            <button onclick="openModal()">อ่านเพิ่มเติม</button>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>รายละเอียดข่าว</h2>
        <p>
        ศูนย์แพทยศาสตรศึกษาชั้นคลินิก ได้จัดกิจกรรมอบรม...
        </p>
    </div>
</div>

<!-- Map -->
<div class="section" id="map">
    <h2>แผนที่</h2>
    <iframe 
        src="https://www.google.com/maps?q=โรงพยาบาลชุมพรเขตรอุดมศักดิ์&output=embed">
    </iframe>
</div>

<script>
function openModal() {
    document.getElementById("modal").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
