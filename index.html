<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEC CHUMPHON</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Prompt', sans-serif;
}

/* HERO BACKGROUND FIX (ไม่ให้หัวขาด) */
.hero-bg {
  background-image: url('YOUR-HERO-IMAGE.jpg'); /* ใส่ path รูปจริง */
  background-size: cover;
  background-position: center top; /* สำคัญมาก */
  background-repeat: no-repeat;
}
</style>

</head>
<body class="bg-gray-100">

<!-- ================= NAVBAR ================= -->
<header class="sticky top-0 z-50 bg-white shadow-md">
  <div class="flex justify-between items-center px-6 py-4">

    <!-- Logo -->
    <div class="flex items-center gap-3">
      <img src="YOUR-LOGO.png" class="h-12 w-12 object-contain">
      <span class="text-xl font-bold text-blue-900">
        MEC CHUMPHON
      </span>
    </div>

    <!-- Menu -->
    <nav class="hidden md:flex gap-8 text-gray-700 font-medium">
      <a href="#" class="hover:text-blue-900 transition">หน้าแรก</a>
      <a href="#" class="hover:text-blue-900 transition">เกี่ยวกับหน่วยงาน</a>
      <a href="#" class="hover:text-blue-900 transition">นักศึกษา</a>
      <a href="#" class="hover:text-blue-900 transition">ศูนย์รวมโปรแกรม</a>
      <a href="#" class="hover:text-blue-900 transition">ติดต่อ</a>
    </nav>

    <!-- Language -->
    <button class="border px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-900 hover:text-white transition">
      TH
    </button>

  </div>
</header>


<!-- ================= HERO ================= -->
<section class="hero-bg relative h-[65vh] min-h-[500px] flex items-center">

  <!-- Overlay -->
  <div class="absolute inset-0 bg-blue-900/60"></div>

  <!-- Content -->
  <div class="relative z-10 max-w-6xl mx-auto px-6 text-white">
    <h1 class="text-5xl md:text-6xl font-bold mb-6">
      Medical Education Center
    </h1>
    <p class="text-lg md:text-xl max-w-2xl mb-8">
      โรงพยาบาลชุมพรเขตรอุดมศักดิ์ มุ่งมั่นพัฒนาการศึกษาทางคลินิก
      และผลิตแพทย์คุณภาพสู่สังคม
    </p>

    <button class="bg-white text-blue-900 px-8 py-3 rounded-lg font-semibold hover:scale-95 transition">
      ดูหลักสูตร
    </button>
  </div>

</section>


</body>
</html>
